<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المختبر - استكمال بيانات الحجز</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- 3D Background -->
    <div id="canvas-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/dna-scene.js"></script>

    <nav class="glass-card"
        style="margin: 20px; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;">
        <div class="brand">
            <a href="index.html"
                style="text-decoration: none; font-weight: bold; font-size: 1.5rem; color: var(--color-royal-blue);">المختبر</a>
        </div>
        <div class="nav-links">
            <a href="patient-tests.html"
                style="text-decoration: none; color: var(--color-deep-navy); margin-right: 20px;">العودة للفحوصات</a>
        </div>
    </nav>

    <div class="container"
        style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding-bottom: 50px;">

        <div class="glass-card" style="padding: 40px; width: 100%; max-width: 700px;">
            <h2 style="margin-bottom: 20px; color: var(--color-deep-navy); text-align: center;">بيانات المريض</h2>
            <div id="selectedTestDisplay"
                style="text-align: center; margin-bottom: 30px; color: var(--color-royal-blue); font-weight: bold; font-size: 1.2rem;">
                <!-- Filled by JS -->
            </div>

            <form id="bookingForm">
                <div style="margin-bottom: 20px; text-align: right;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">اسم المريض (رباعي)</label>
                    <input type="text" id="pName" required placeholder="الاسم بالكامل"
                        onblur="validateInput(this, 'required')"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: var(--font-main);">
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <!-- DOB -->
                    <div style="flex: 1; text-align: right;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">تاريخ الميلاد</label>
                        <input type="date" id="pDOB" required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: var(--font-main);">
                    </div>
                    <!-- Gender -->
                    <div style="flex: 1; text-align: right;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">النوع</label>
                        <select id="pGender"
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: var(--font-main);">
                            <option value="male">ذكر</option>
                            <option value="female">أنثى</option>
                        </select>
                    </div>
                </div>

                <!-- Phone -->
                <div style="margin-bottom: 20px; text-align: right;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">رقم الهاتف</label>
                    <input type="tel" id="pPhone" required placeholder="01xxxxxxxxx"
                        onblur="validateInput(this, 'phone')"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: var(--font-main);">
                </div>

                <!-- Address -->
                <div style="margin-bottom: 20px; text-align: right;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">العنوان بالتفصيل</label>
                    <input type="text" id="pAddress" required placeholder="الشارع - المنطقة - المحافظة"
                        onblur="validateInput(this, 'required')"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: var(--font-main);">
                </div>

                <!-- Payment -->
                <div style="margin-bottom: 30px; text-align: right;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">طريقة الدفع</label>
                    <select id="pPayment"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-family: var(--font-main);">
                        <option value="cash">كاش (في المعمل)</option>
                        <option value="visa">دفع إلكتروني (Visa/Mastercard)</option>
                    </select>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn btn-secondary" style="flex: 2;">تأكيد الحجز</button>
                    <button type="button" onclick="history.back()" class="btn btn-primary"
                        style="flex: 1; opacity: 0.8;">عودة</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const testName = urlParams.get('test');
            const testPrice = urlParams.get('price');

            if (testName) {
                document.getElementById('selectedTestDisplay').innerHTML = `حجز تحليل: ${decodeURIComponent(testName)} <br> <span style="font-size: 0.9rem; color: #666">تكلة الفحص: ${testPrice}</span>`;
            }

            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!validateInput(document.getElementById('pName'), 'required') ||
                    !validateInput(document.getElementById('pPhone'), 'phone')) {
                    return;
                }

                // We need to determine if we are booking as a Registered Patient (Token) or Guest.
                // The current form collects Name, DOB, Phone etc.
                // My API supports:
                // 1. POST /patient/book (Requires Token, uses User ID)
                // 2. POST /admin/reservation (Guest Name) - CURRENTLY ADMIN ONLY.

                // I need a public guest booking endpoint? 
                // "POST /api/patient/book-guest"?
                // Or I should just use the Admin endpoint but make it public? No, security risk.
                // I will add a Guest Booking endpoint to `patient.py`.

                // WAIT! I can use the same `book` endpoint but allow it to be public if `guest_name` is provided?
                // But `book` currently requires `@token_required`.

                // I will modify `patient.py` again to add `book-guest` or relax `book`.
                // For now, I'll Assume the user is just submitting a request.
                // I'll call a new endpoint `POST /api/patient/book-guest`.

                const pData = {
                    name: document.getElementById('pName').value,
                    dob: document.getElementById('pDOB').value,
                    gender: document.getElementById('pGender').value,
                    phone: document.getElementById('pPhone').value,
                    address: document.getElementById('pAddress').value,
                    test_name: testName ? decodeURIComponent(testName) : "فحص عام",
                    price: parseFloat(testPrice || "0"),
                    payment: document.getElementById('pPayment').value,
                    // Sending Date? Backend sets created_at.
                };

                try {
                    const response = await fetch(`${API_URL}/patient/book-guest`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(pData)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        alert(`تم تسجيل بياناتك وحجز الموعد بنجاح!\nرقم الحجز: ${result.booking.id}`);
                        window.location.href = 'index.html';
                    } else {
                        alert('فشل الحجز. حاول مرة أخرى.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('خطأ في الاتصال بالسيرفر. تأكد من تشغيل البرنامج (Backend).\n' + error.message);
                }
            });
        });
    </script>
</body>

</html>
