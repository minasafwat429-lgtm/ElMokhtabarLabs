<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المختبر - بوابة المرضى</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- 3D Background -->
    <div id="canvas-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/dna-scene.js"></script>

    <div class="intro-overlay">
        <h1 style="margin-bottom: 50px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">أهلاً بك في بوابة المرضى</h1>

        <div style="display: flex; gap: 40px; justify-content: center; flex-wrap: wrap;">
            <!-- Book Appointment Option -->
            <a href="patient-tests.html" class="glass-card"
                style="text-decoration: none; padding: 40px; width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; color: var(--color-deep-navy);">
                <div style="font-size: 4rem; margin-bottom: 20px;">📅</div>
                <h2 style="margin-bottom: 10px; color: var(--color-royal-blue);">حجز موعد جديد</h2>
                <p style="text-align: center; color: #555;">تصفح الفحوصات واحجز موعدك بسهولة</p>
            </a>

            <!-- View Results Option -->
            <a href="patient-results.html" class="glass-card"
                style="text-decoration: none; padding: 40px; width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; color: var(--color-deep-navy);">
                <div style="font-size: 4rem; margin-bottom: 20px;">📄</div>
                <h2 style="margin-bottom: 10px; color: var(--color-medical-teal);">عرض النتائج</h2>
                <p style="text-align: center; color: #555;">شاهد وحمل نتائج تحاليلك السابقة</p>
            </a>
        </div>

        <a href="index.html" class="btn btn-primary" style="margin-top: 50px;">العودة للرئيسية</a>
    </div>

</body>

</html>
